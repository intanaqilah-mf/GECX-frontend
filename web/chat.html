<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: white; }
    chat-messenger {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 999;
    }
  </style>
  <script defer src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js"></script>
</head>
<body>
  <script>
    window.addEventListener("chat-messenger-loaded", () => {
      chatSdk.registerContext(
        chatSdk.prebuilts.ces.createContext({
          deploymentName: "projects/483471568825/locations/us/apps/27be6c70-74dc-4e50-a3e8-25b032e7c965/deployments/7cbb68f9-147f-4698-be02-e7ea5fa5d1a3",
          tokenBroker: { enableTokenBroker: true, enableRecaptcha: false }
        }),
      );

      // Force open the chat window after a small delay
      setTimeout(() => {
        const el = document.querySelector('chat-messenger');
        if (el) {
          el.setAttribute('open', 'true');
          // Some versions use these methods
          if (el.expandChatWindow) el.expandChatWindow();
          if (el.openChat) el.openChat();
        }
      }, 500);
    });
  </script>
  <chat-messenger
    url-allowlist="*"
    intent="WELCOME"
    chat-title="ACN Bank Assistant">
    <chat-messenger-container></chat-messenger-container>
  </chat-messenger>
</body>
</html>
